server {
    listen 80;
    server_name yourdomain.com;  # Ganti dengan domain kamu

    # Redirect HTTP ke HTTPS (uncomment jika sudah setup SSL)
    # return 301 https://$server_name$request_uri;

    # Max upload size (sesuaikan dengan kebutuhan)
    client_max_body_size 50M;

    # Serve file uploads langsung dari Nginx (PENTING!)
    # Ini yang mencegah 404 pada file PDF, gambar, audio yang di-upload
    location /uploads/ {
        alias /var/www/html/idea/idea-lms/static/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
        
        # Disable directory listing
        autoindex off;
    }

    # Serve static assets dari build output (favicon, css, js, dll)
    location /favicon.svg {
        root /var/www/idea-space/build/client;
        expires 30d;
    }

    location /_app/ {
        root /var/www/idea-space/build/client;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Semua request lain diteruskan ke SvelteKit Node server
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # Fallback untuk uploads yang tidak ditemukan
    location @app {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

